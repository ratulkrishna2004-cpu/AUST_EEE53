<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE-53 | Spardho 53</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --maroon-header: #800000;
            --maroon-dark: #4d0000;
            --gold: #FFD700;
            --neon-green: #00FF00;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        /* --- HEADER SECTION (As per screenshot) --- */
        header {
            background: linear-gradient(to bottom, var(--maroon-header), var(--maroon-dark));
            padding: 15px 0;
            text-align: center;
        }

        .header-top {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .main-logo { height: 50px; }
        .header-title { color: var(--gold); font-style: italic; font-size: 1.5rem; font-weight: bold; }

        /* Search Bar with Green Border */
        .search-wrapper {
            max-width: 95%;
            margin: 10px auto;
            display: flex;
            border: 2px solid var(--neon-green);
            border-radius: 30px;
            overflow: hidden;
            background: #fff;
        }

        .search-wrapper input {
            flex: 1; border: none; padding: 10px 20px; outline: none; font-size: 1rem;
        }

        .search-wrapper button {
            background: #cc0000; color: #fff; border: none; padding: 0 25px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        /* --- NAVIGATION MENU --- */
        .navbar { background: var(--maroon-dark); padding: 5px 0; position: relative; }
        
        .nav-menu {
            display: flex; flex-wrap: wrap; justify-content: center;
            list-style: none; margin: 0; padding: 10px; gap: 5px;
        }

        .nav-menu li a {
            color: #fff; text-decoration: none; font-size: 14px; padding: 5px 12px;
            transition: 0.3s; display: block;
        }

        .nav-menu li a:hover { color: var(--gold); }

        /* Mobile Menu Icon (Hidden on PC) */
        .menu-toggle {
            display: none; font-size: 1.8rem; color: var(--gold);
            cursor: pointer; padding: 10px; text-align: right; margin-right: 20px;
        }

        /* --- THEME SECTION --- */
        .theme-section {
            width: 100%; height: auto; min-height: 300px;
            background-image: url('Theme.png');
            background-size: cover; background-position: center;
        }

        /* --- FOOTER SECTION --- */
        footer {
            background: #000; border-top: 1px solid #333;
            padding: 30px 20px 15px 20px; margin-top: 50px;
        }

        .footer-top {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto;
        }

        .footer-left { font-size: 1.5rem; font-weight: bold; color: var(--gold); }
        .footer-right .mail-icon { font-size: 1.5rem; color: var(--gold); text-decoration: none; }

        .footer-dev {
            text-align: center; margin-top: 20px; font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* --- RESPONSIVE LOGIC --- */
        @media screen and (max-width: 768px) {
            .nav-menu {
                display: none; /* মোবাইলে মেনু হাইড */
                flex-direction: column; width: 100%; text-align: left;
                background: var(--maroon-dark);
            }
            .nav-menu.active { display: flex; }
            .menu-toggle { display: block; } /* মোবাইলে ৩ লাইন শো */
            
            .nav-menu li { border-bottom: 1px solid rgba(255,255,255,0.1); }
        }
    </style>
</head>
<body>

    <!-- Header Part -->
    <header>
        <div class="header-top">
            <img src="Logo-batch.png" alt="Logo" class="main-logo">
            <div class="header-title">AUST EEE-2.1</div>
        </div>

        <div class="search-wrapper">
            <input type="text" placeholder="Search...">
            <button>Search</button>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
        <ul class="nav-menu" id="navLinks">
            <li><a href="#">Home</a></li>
            <li><a href="#">2.1 Study Materials</a></li>
            <li><a href="#">Previous Semester</a></li>
            <li><a href="#">Routine</a></li>
            <li><a href="#">Exams</a></li>
            <li><a href="#">Faculty</a></li>
            <li><a href="#">BUS Route</a></li>
            <li><a href="#">Notice</a></li>
            <li><a href="#">CR & GM Section</a></li>
            <li><a href="#">Credits</a></li>
            <li><a href="#">OBE Syllabus</a></li>
            <li><a href="#">Helping Sites</a></li>
            <li><a href="#">Waiver</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
    </nav>

    <!-- Theme Section -->
    <div class="theme-section">
        <!-- Theme.png image will show here -->
    </div>

    <!-- Main Content could be here -->

    <!-- Footer Part -->
    <footer>
        <div class="footer-top">
            <div class="footer-left">
                <a href="index.html" style="color: inherit; text-decoration: none;">AUST EEE-53</a>
            </div>
            <div class="footer-right">
                <a href="mailto:austeee53@gmail.com" class="mail-icon">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
        <div class="footer-dev">
            Developed by: Ratul Krishna Mojumder
        </div>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('navLinks');
            menu.classList.toggle('active');
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE-2.1 | Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --maroon: #800000;
            --maroon-dark: #4d0000;
            --gold: #FFD700;
            --neon-green: #39FF14;
            --neon-blue: #00FFFF;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(to bottom, var(--maroon), var(--maroon-dark));
            padding: 10px 0; text-align: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-top { display: flex; justify-content: center; align-items: center; gap: 15px; position: relative; }
        .main-logo { height: 45px; }
        .header-title { color: var(--gold); font-style: italic; font-size: 1.4rem; font-weight: bold; }

        .menu-toggle { display: none; position: absolute; right: 20px; font-size: 24px; color: #fff; cursor: pointer; }

        .search-wrapper {
            max-width: 90%; margin: 10px auto; display: flex;
            border: 2px solid #00FF00; border-radius: 30px;
            overflow: hidden; background: #fff;
        }
        .search-wrapper input { flex: 1; border: none; padding: 8px 15px; outline: none; color: #000; }
        .search-wrapper button { background: #cc0000; color: #fff; border: none; padding: 0 15px; cursor: pointer; }

        .navbar { background: var(--maroon-dark); border-bottom: 1px solid rgba(255,215,0,0.2); }
        .nav-menu {
            display: flex; flex-wrap: wrap; justify-content: center;
            list-style: none; margin: 0; padding: 8px; gap: 5px;
        }
        .nav-menu li a { color: #fff; text-decoration: none; font-size: 12px; padding: 5px 8px; transition: 0.3s; }
        .nav-menu li a:hover { color: var(--gold); }

        /* --- THEME & WAVES (UPDATED) --- */
        .theme-container {
            position: relative;
            width: 100%; height: 85vh;
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Image enlarged to cover more space */
        .theme-viewport { width: 95%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 5; }
        .theme-viewport img { width: 100%; height: 100%; object-fit: contain; }

        .wave-sidebar {
            position: absolute; top: 0; bottom: 0;
            width: 100px; height: 100%;
            overflow: hidden; pointer-events: none;
            z-index: 6;
        }
        /* Left sinusoidal wave moved right for full visibility */
        .wave-left { left: 50px; } 
        .wave-right { right: 15px; transform: scaleX(-1); }

        .wave-column {
            position: relative; height: 200%; width: 100%;
            animation: scroll-down 15s linear infinite; /* T=15s */
        }
        @keyframes scroll-down { from { transform: translateY(-50%); } to { transform: translateY(0%); } }
        .wave-svg-unit { width: 100%; height: 50%; }
        .traveling-path { filter: drop-shadow(0 0 12px currentColor); }

        /* --- CIRCUIT SWITCH ANIMATION (UPDATED) --- */
        .shutter-panel {
            position: relative; z-index: 10; background: #050000;
            padding: 60px 0 20px; border-top: 3px solid var(--maroon);
        }
        .circuit-container { display: flex; justify-content: center; gap: 100px; padding-bottom: 40px; flex-wrap: wrap; }
        
        .circuit-switch {
            position: relative; text-align: center; cursor: pointer; padding: 20px;
        }
        
        .switch-label { 
            font-weight: bold; font-size: 1.5rem; color: #fff; 
            display: block; margin-bottom: 25px; transition: 0.5s;
        }

        .wire-container {
            display: flex; align-items: center; justify-content: center; gap: 20px; /* Wider gap for move effect */
        }
        .wire-piece {
            width: 35px; height: 4px; background: #333; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* The "Join" move effect */
        .circuit-switch:hover .wire-piece:first-child { transform: translateX(15px); }
        .circuit-switch:hover .wire-piece:last-child { transform: translateX(-15px); }

        .chip-icon { font-size: 2.8rem; color: #333; transition: 0.5s; }

        /* Mid Glow */
        .mid-switch:hover .switch-label { color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        .mid-switch:hover .wire-piece { background: var(--gold); box-shadow: 0 0 12px var(--gold); }
        .mid-switch:hover .chip-icon { color: var(--gold); transform: scale(1.1); filter: drop-shadow(0 0 8px var(--gold)); }

        /* Final Glow */
        .final-switch:hover .switch-label { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
        .final-switch:hover .wire-piece { background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green); }
        .final-switch:hover .chip-icon { color: var(--neon-green); transform: scale(1.1); filter: drop-shadow(0 0 8px var(--neon-green)); }

        .calendar-box { max-width: 95%; margin: 20px auto; border: 2px solid var(--maroon); }

        /* --- FOOTER --- */
        footer { background: #000; padding: 30px 50px; border-top: 1px solid #1a1a1a; }
        .footer-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .footer-logo-link { color: var(--gold); font-weight: bold; font-size: 1.5rem; text-decoration: none; }
        .footer-mail-link { color: var(--gold); font-size: 1.8rem; transition: 0.3s; }
        .dev-credit { 
            text-align: center; color: #fff; font-weight: bold; font-size: 1rem;
            margin-top: 10px; border-top: 1px solid #222; padding-top: 10px;
        }

        @media screen and (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-menu { display: none; flex-direction: column; width: 100%; background: var(--maroon-dark); }
            .nav-menu.active { display: flex; }
            .wave-left { left: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <img src="Logo-batch.png" alt="Logo" class="main-logo">
            <div class="header-title">AUST EEE-2.1</div>
            <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        </div>
        <div class="search-wrapper">
            <input type="text" placeholder="Search resources...">
            <button>Search</button>
        </div>
        <nav class="navbar">
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">2.1 Study Materials</a></li>
                <li><a href="#">Previous Semester</a></li>
                <li><a href="#">Routine</a></li>
                <li><a href="#">Exams</a></li>
                <li><a href="#">Faculty</a></li>
                <li><a href="#">BUS Route</a></li>
                <li><a href="#">Notice</a></li>
                <li><a href="#">CR & GM Section</a></li>
                <li><a href="#">Credits</a></li>
                <li><a href="#">OBE Syllabus</a></li>
                <li><a href="#">Helping Sites</a></li>
                <li><a href="#">Waiver</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="theme-container">
        <!-- Left Sinusoidal Wave -->
        <div class="wave-sidebar wave-left">
            <div class="wave-column">
                <div class="wave-svg-unit" id="wave-l"></div>
                <div class="wave-svg-unit" id="wave-l-d"></div>
            </div>
        </div>

        <div class="theme-viewport">
            <img src="Theme.png" alt="AUST Theme">
        </div>

        <!-- Right Square Wave -->
        <div class="wave-sidebar wave-right">
            <div class="wave-column">
                <div class="wave-svg-unit" id="wave-r"></div>
                <div class="wave-svg-unit" id="wave-r-d"></div>
            </div>
        </div>
    </div>

    <div class="shutter-panel">
        <section class="circuit-container">
            <div class="circuit-switch mid-switch" onclick="window.open('https://drive.google.com/drive/folders/1pkQrFPMUpagvHlvT8JCxGXLZuhA7yLv6', '_blank')">
                <span class="switch-label">MID</span>
                <div class="wire-container">
                    <div class="wire-piece"></div>
                    <i class="fas fa-microchip chip-icon"></i>
                    <div class="wire-piece"></div>
                </div>
            </div>

            <div class="circuit-switch final-switch" onclick="window.open('https://final-exam-psi-neon.vercel.app/', '_blank')">
                <span class="switch-label">FINAL</span>
                <div class="wire-container">
                    <div class="wire-piece"></div>
                    <i class="fas fa-bolt chip-icon"></i>
                    <div class="wire-piece"></div>
                </div>
            </div>
        </section>

        <div class="calendar-box">
            <iframe src="https://calendar.google.com/calendar/embed?src=austeee53@gmail.com&ctz=Asia%2FDhaka" 
            style="border: 0" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
        </div>

        <footer>
            <div class="footer-top-row">
                <a href="index.html" class="footer-logo-link">AUST EEE-53</a>
                <a href="mailto:austeee53@gmail.com" class="footer-mail-link"><i class="fas fa-envelope-open-text"></i></a>
            </div>
            <div class="dev-credit">Developed by: **Ratul Krishna Mojumder**</div>
        </footer>
    </div>

    <script>
        function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

        function generateWave(type, color) {
            let path = "";
            if(type === 'sine') {
                // Modified Sine path for better amplitude visibility
                path = "M15,0 ";
                for(let i=0; i<=1000; i+=80) { path += `Q85,${i+20} 15,${i+40} T15,${i+80} `; }
            } else {
                path = "M5,0 ";
                for(let i=0; i<=1000; i+=60) { path += `L75,${i} L75,${i+30} L5,${i+30} L5,${i+60} `; }
            }
            // Larger viewBox width for Sine wave curves
            return `<svg preserveAspectRatio="none" viewBox="0 0 90 1000" style="height:100%; width:100%; color:${color};">
                        <path d="${path}" fill="none" stroke="currentColor" stroke-width="4" class="traveling-path"/>
                    </svg>`;
        }

        document.getElementById('wave-l').innerHTML = generateWave('sine', 'var(--neon-blue)');
        document.getElementById('wave-l-d').innerHTML = generateWave('sine', 'var(--neon-blue)');
        document.getElementById('wave-r').innerHTML = generateWave('square', 'var(--neon-green)');
        document.getElementById('wave-r-d').innerHTML = generateWave('square', 'var(--neon-green)');
    </script>
</body>
</html>

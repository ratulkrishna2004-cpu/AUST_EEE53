<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE-2.1 | Traveling Wave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --maroon: #800000;
            --maroon-dark: #4d0000;
            --gold: #FFD700;
            --neon-green: #39FF14;
            --neon-blue: #00FFFF;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* --- HEADER & NAVBAR (No Changes) --- */
        header {
            background: linear-gradient(to bottom, var(--maroon), var(--maroon-dark));
            padding: 10px 0; text-align: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header-top { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .main-logo { height: 45px; }
        .header-title { color: var(--gold); font-style: italic; font-size: 1.4rem; font-weight: bold; }
        
        .navbar { background: var(--maroon-dark); border-bottom: 1px solid rgba(255,215,0,0.2); }
        .nav-menu {
            display: flex; flex-wrap: wrap; justify-content: center;
            list-style: none; margin: 0; padding: 8px; gap: 10px;
        }
        .nav-menu li a { color: #fff; text-decoration: none; font-size: 13px; padding: 5px 10px; }

        /* --- THEME & TRAVELING WAVE SECTION --- */
        .theme-container {
            position: relative;
            width: 100%; height: calc(100vh - 120px);
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .theme-viewport {
            width: 60%; height: 90%; 
            z-index: 5;
            display: flex; justify-content: center; align-items: center;
        }
        .theme-viewport img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Wave Sidebars */
        .wave-sidebar {
            position: absolute; top: 0; bottom: 0;
            width: 20%; height: 100%;
            pointer-events: none;
            display: flex; justify-content: space-around;
        }
        .wave-left { left: 0; }
        .wave-right { right: 0; transform: scaleX(-1); }

        /* Traveling Wave Animation Logic */
        .wave-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: travel 2s linear infinite; /* T=2s */
        }

        @keyframes travel {
            to { stroke-dashoffset: 0; }
        }

        /* SVG styling to fill the height */
        .traveling-svg {
            height: 100%; width: 60px;
            filter: drop-shadow(0 0 10px currentColor);
        }

        /* --- SHUTTER PANEL --- */
        .shutter-panel {
            position: relative; z-index: 10;
            background: #050000;
            padding: 50px 0; border-top: 3px solid var(--maroon);
        }

        .circuit-container { display: flex; justify-content: center; gap: 50px; flex-wrap: wrap; }
        .circuit-switch { text-align: center; cursor: pointer; color: #333; transition: 0.3s; }
        .circuit-switch:hover { color: var(--gold); }
        .chip-icon { font-size: 3rem; display: block; margin-bottom: 10px; }

        .dev-credit { 
            text-align: center; margin-top: 50px; font-weight: bold; color: var(--gold);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <img src="Logo-batch.png" alt="Logo" class="main-logo">
            <div class="header-title">AUST EEE-2.1</div>
        </div>
        <nav class="navbar">
            <ul class="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Study Materials</a></li>
                <li><a href="#">Routine</a></li>
                <li><a href="#">Exams</a></li>
                <li><a href="#">Faculty</a></li>
            </ul>
        </nav>
    </header>

    <div class="theme-container">
        <!-- Left Side Traveling Waves -->
        <div class="wave-sidebar wave-left">
            <!-- Sinusoidal -->
            <svg class="traveling-svg" preserveAspectRatio="none" viewBox="0 0 50 1000" style="color: var(--gold);">
                <path class="wave-path" fill="none" stroke="currentColor" stroke-width="3" 
                d="M25,0 Q45,25 25,50 T25,100 T25,150 T25,200 T25,250 T25,300 T25,350 T25,400 T25,450 T25,500 T25,550 T25,600 T25,650 T25,700 T25,750 T25,800 T25,850 T25,900 T25,950 T25,1000" />
            </svg>
            <!-- Square -->
            <svg class="traveling-svg" preserveAspectRatio="none" viewBox="0 0 50 1000" style="color: var(--neon-green);">
                <path class="wave-path" fill="none" stroke="currentColor" stroke-width="3" 
                d="M10,0 L40,0 L40,50 L10,50 L10,100 L40,100 L40,150 L10,150 L10,200 L40,200 L40,250 L10,250 L10,300 L40,300 L40,350 L10,350 L10,400 L40,400 L40,450 L10,450 L10,500 L40,500 L40,550 L10,550 L10,600 L40,600 L40,650 L10,650 L10,700 L40,700 L40,750 L10,750 L10,800 L40,800 L40,850 L10,850 L10,900 L40,900 L40,950 L10,950 L10,1000" />
            </svg>
        </div>

        <div class="theme-viewport">
            <img src="Theme.png" alt="Main Theme">
        </div>

        <!-- Right Side Traveling Waves -->
        <div class="wave-sidebar wave-right">
            <!-- Sinusoidal -->
            <svg class="traveling-svg" preserveAspectRatio="none" viewBox="0 0 50 1000" style="color: var(--neon-blue);">
                <path class="wave-path" fill="none" stroke="currentColor" stroke-width="3" 
                d="M25,0 Q45,25 25,50 T25,100 T25,150 T25,200 T25,250 T25,300 T25,350 T25,400 T25,450 T25,500 T25,550 T25,600 T25,650 T25,700 T25,750 T25,800 T25,850 T25,900 T25,950 T25,1000" />
            </svg>
            <!-- Sawtooth -->
            <svg class="traveling-svg" preserveAspectRatio="none" viewBox="0 0 50 1000" style="color: var(--gold);">
                <path class="wave-path" fill="none" stroke="currentColor" stroke-width="3" 
                d="M10,0 L40,50 L10,50 L40,100 L10,100 L40,150 L10,150 L40,200 L10,200 L40,250 L10,250 L40,300 L10,300 L40,350 L10,350 L40,400 L10,400 L40,450 L10,450 L40,500 L10,500 L40,550 L10,550 L40,600 L10,600 L40,650 L10,650 L40,700 L10,700 L40,750 L10,750 L40,800 L10,800 L40,850 L10,850 L40,900 L10,900 L40,950 L10,950 L40,1000" />
            </svg>
        </div>
    </div>

    <div class="shutter-panel">
        <section class="circuit-container">
            <div class="circuit-switch" onclick="window.open('https://drive.google.com/drive/folders/1pkQrFPMUpagvHlvT8JCxGXLZuhA7yLv6', '_blank')">
                <i class="fas fa-microchip chip-icon"></i>
                <span>MID DRIVE</span>
            </div>
            <div class="circuit-switch" onclick="window.open('https://final-exam-psi-neon.vercel.app/', '_blank')">
                <i class="fas fa-bolt chip-icon"></i>
                <span>FINAL DRIVE</span>
            </div>
        </section>
        <div class="dev-credit">Developed by: Ratul Krishna Mojumder</div>
    </div>

</body>
</html>

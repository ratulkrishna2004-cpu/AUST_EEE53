<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE-2.1 | Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --maroon: #800000;
            --maroon-dark: #4d0000;
            --gold: #FFD700;
            --neon-green: #39FF14;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(to bottom, var(--maroon), var(--maroon-dark));
            padding: 10px 0; text-align: center;
            position: fixed; top: 0; width: 100%;
            z-index: 1000;
            border-bottom: 2px solid var(--gold);
        }
        .header-top { display: flex; justify-content: center; align-items: center; gap: 15px; position: relative; }
        .main-logo { height: 45px; }
        .header-title { color: var(--gold); font-style: italic; font-size: 1.4rem; font-weight: bold; }

        .menu-toggle { display: none; position: absolute; right: 20px; font-size: 24px; color: #fff; cursor: pointer; }

        .search-wrapper {
            max-width: 90%; margin: 10px auto; display: flex;
            border: 2px solid #00FF00; border-radius: 30px;
            overflow: hidden; background: #fff;
        }
        .search-wrapper input { flex: 1; border: none; padding: 8px 15px; outline: none; color: #000; }
        .search-wrapper button { background: #cc0000; color: #fff; border: none; padding: 0 15px; cursor: pointer; }

        .navbar { background: var(--maroon-dark); }
        .nav-menu {
            display: flex; flex-wrap: wrap; justify-content: center;
            list-style: none; margin: 0; padding: 8px; gap: 5px;
        }
        .nav-menu li a { color: #fff; text-decoration: none; font-size: 12px; padding: 5px 8px; transition: 0.3s; }
        .nav-menu li a:hover { color: var(--gold); }

        /* --- THEME AREA (Ratio Fixed) --- */
        .theme-container {
            position: fixed;
            top: 170px;
            left: 0; width: 100%; height: calc(100vh - 170px);
            z-index: 1;
            background: #000;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .theme-viewport { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .theme-viewport img { width: 100%; height: 100%; object-fit: contain; }

        /* --- SHUTTER PANEL --- */
        .shutter-panel {
            position: relative;
            margin-top: 100vh;
            z-index: 10;
            background: #050000;
            padding: 60px 0 20px;
            border-top: 5px solid var(--maroon);
            box-shadow: 0 -20px 40px rgba(0,0,0,0.9);
        }

        .circuit-container { display: flex; justify-content: center; gap: 100px; padding-bottom: 40px; flex-wrap: wrap; }
        .circuit-switch { position: relative; text-align: center; cursor: pointer; padding: 20px; }
        .switch-label { font-weight: bold; font-size: 1.5rem; color: #fff; display: block; margin-bottom: 25px; }
        .wire-container { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .wire-piece { width: 35px; height: 4px; background: #333; transition: 0.4s ease-in-out; }
        .circuit-switch:hover .wire-piece:first-child { transform: translateX(12px); }
        .circuit-switch:hover .wire-piece:last-child { transform: translateX(-12px); }
        .chip-icon { font-size: 2.8rem; color: #333; transition: 0.5s; }

        .mid-switch:hover .switch-label { color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        .mid-switch:hover .wire-piece { background: var(--gold); box-shadow: 0 0 12px var(--gold); }
        .mid-switch:hover .chip-icon { color: var(--gold); transform: scale(1.1); }

        .final-switch:hover .switch-label { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
        .final-switch:hover .wire-piece { background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green); }
        .final-switch:hover .chip-icon { color: var(--neon-green); transform: scale(1.1); }

        .calendar-box { max-width: 95%; margin: 20px auto; border: 2px solid var(--maroon); }

        /* --- MOBILE FIXES --- */
        @media screen and (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-menu { display: none; flex-direction: column; width: 100%; background: var(--maroon-dark); }
            .nav-menu.active { display: flex; }
            .theme-container { top: 200px; }
            /* Mobile Theme Ratio Fix */
            .theme-viewport img { 
                width: 100%; 
                height: auto; 
                object-fit: contain; 
            }
            .circuit-container { gap: 40px; }
        }

        footer { background: #000; padding: 30px 20px; border-top: 1px solid #1a1a1a; text-align: center; }
        .footer-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .footer-logo-link { color: var(--gold); font-weight: bold; font-size: 1.3rem; text-decoration: none; }
        .footer-mail-link { color: var(--gold); font-size: 1.6rem; }
        .dev-credit { color: #fff; font-weight: bold; font-size: 0.9rem; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <img src="Logo-batch.png" alt="Logo" class="main-logo">
            <div class="header-title">AUST EEE-2.1</div>
            <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        </div>
        <div class="search-wrapper">
            <input type="text" placeholder="Search resources...">
            <button>Search</button>
        </div>
        <nav class="navbar">
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">2.1 Study Materials</a></li>
                <li><a href="#">Previous Semester</a></li>
                <li><a href="#">Routine</a></li>
                <li><a href="#">Exams</a></li>
                <li><a href="#">Faculty</a></li>
                <li><a href="#">BUS Route</a></li>
                <li><a href="#">Notice</a></li>
                <li><a href="#">CR & GM Section</a></li>
                <li><a href="#">Credits</a></li>
                <li><a href="#">OBE Syllabus</a></li>
                <li><a href="#">Helping Sites</a></li>
                <li><a href="#">Waiver</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="theme-container">
        <div class="theme-viewport">
            <img src="Theme.png" alt="AUST Theme">
        </div>
    </div>

    <div class="shutter-panel">
        <section class="circuit-container">
            <div class="circuit-switch mid-switch" onclick="window.open('https://drive.google.com/drive/folders/1pkQrFPMUpagvHlvT8JCxGXLZuhA7yLv6', '_blank')">
                <span class="switch-label">MID</span>
                <div class="wire-container">
                    <div class="wire-piece"></div>
                    <i class="fas fa-microchip chip-icon"></i>
                    <div class="wire-piece"></div>
                </div>
            </div>

            <div class="circuit-switch final-switch" onclick="window.open('https://final-exam-psi-neon.vercel.app/', '_blank')">
                <span class="switch-label">FINAL</span>
                <div class="wire-container">
                    <div class="wire-piece"></div>
                    <i class="fas fa-bolt chip-icon"></i>
                    <div class="wire-piece"></div>
                </div>
            </div>
        </section>

        <div class="calendar-box">
            <iframe src="https://calendar.google.com/calendar/embed?src=austeee53@gmail.com&ctz=Asia%2FDhaka" 
            style="border: 0" width="100%" height="450" frameborder="0" scrolling="no"></iframe>
        </div>

        <footer>
            <div class="footer-top-row">
                <a href="index.html" class="footer-logo-link">AUST EEE-53</a>
                <a href="mailto:austeee53@gmail.com" class="footer-mail-link"><i class="fas fa-envelope-open-text"></i></a>
            </div>
            <div class="dev-credit">Developed by: Ratul Krishna Mojumder</div>
        </footer>
    </div>

    <script>
        function toggleMenu() {
            var menu = document.getElementById('navMenu');
            menu.classList.toggle('active');
        }
    </script>
</body>
</html>

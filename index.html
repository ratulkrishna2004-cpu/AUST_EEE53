<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE 53 | Official Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-container">
                <ul class="nav-menu">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">2.1 Study Materials</a></li>
                    <li><a href="#">Previous Semester</a></li>
                    <li><a href="#">Routine</a></li>
                    <li class="dropdown">
                        <a href="#">Exams <i class="fas fa-caret-down"></i></a>
                    </li>
                    <li><a href="#">Faculty</a></li>
                    <li><a href="#">BUS Route</a></li>
                    <li><a href="#">Notice</a></li>
                    <li><a href="#">CR & GM Section</a></li>
                    <li><a href="#">Credits</a></li>
                    <li><a href="#">OBE Syllabus</a></li>
                </ul>
                <ul class="nav-menu secondary">
                    <li><a href="#">Helping Sites</a></li>
                    <li><a href="#">Waiver</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div class="theme-card">
            <img src="Theme.jpg" alt="AUST EEE Theme" class="theme-img">
        </div>
    </section>

    <section class="exam-toggle">
        <div class="toggle-container">
            <input type="checkbox" id="examSwitch" class="switch-input">
            <label for="examSwitch" class="switch-label">
                <span class="switch-text mid">MID</span>
                <span class="switch-knob"></span>
                <span class="switch-text final">FINAL</span>
            </label>
        </div>
    </section>

    <section class="calendar-section">
        <h3>Class Schedule</h3>
        <div class="calendar-wrapper">
            <iframe src="https://calendar.google.com/calendar/embed?src=your_id" style="border: 0" width="100%" height="450" frameborder="0" scrolling="no"></iframe>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <button class="mail-btn"><i class="fas fa-envelope"></i> Batch Mail</button>
            <p>© 2026 AUST EEE 53. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

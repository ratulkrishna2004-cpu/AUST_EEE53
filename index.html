<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE-2.1 | Infinite Flow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --maroon: #800000;
            --maroon-dark: #4d0000;
            --gold: #FFD700;
            --neon-green: #39FF14;
            --neon-blue: #00FFFF;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            background: linear-gradient(to bottom, var(--maroon), var(--maroon-dark));
            padding: 10px 0; text-align: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header-top { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .main-logo { height: 45px; }
        .header-title { color: var(--gold); font-style: italic; font-size: 1.4rem; font-weight: bold; }

        .search-wrapper {
            max-width: 95%; margin: 10px auto; display: flex;
            border: 2px solid #00FF00; border-radius: 30px;
            overflow: hidden; background: #fff;
        }
        .search-wrapper input { flex: 1; border: none; padding: 8px 20px; outline: none; color: #000; }
        .search-wrapper button { background: #cc0000; color: #fff; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }

        .navbar { background: var(--maroon-dark); border-bottom: 1px solid rgba(255,215,0,0.2); }
        .nav-menu {
            display: flex; flex-wrap: wrap; justify-content: center;
            list-style: none; margin: 0; padding: 8px; gap: 5px;
        }
        .nav-menu li a { color: #fff; text-decoration: none; font-size: 12px; padding: 5px 8px; transition: 0.3s; }
        .nav-menu li a:hover { color: var(--gold); }

        /* --- THEME & INFINITE WAVE SECTION --- */
        .theme-container {
            position: relative;
            width: 100%; height: calc(100vh - 160px);
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .theme-viewport {
            width: 85%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            z-index: 5;
        }
        .theme-viewport img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Sidebars */
        .wave-sidebar {
            position: absolute; top: 0; bottom: 0;
            width: 15%; height: 100%;
            pointer-events: none;
            display: flex; justify-content: space-around;
            overflow: hidden;
        }
        .wave-left { left: 0; }
        .wave-right { right: 0; transform: scaleX(-1); }

        /* Infinite Traveling Wave Logic */
        .wave-column {
            position: relative;
            height: 200%; /* Double height for seamless loop */
            width: 40px;
            animation: scroll-down 2s linear infinite; /* T=2 */
        }

        @keyframes scroll-down {
            from { transform: translateY(-50%); }
            to { transform: translateY(0%); }
        }

        .wave-svg-unit {
            width: 100%; height: 50%; /* Fills half of the 200% container */
            display: flex; flex-direction: column;
        }

        .traveling-path {
            filter: drop-shadow(0 0 8px currentColor);
        }

        /* --- SHUTTER PANEL --- */
        .shutter-panel {
            position: relative; z-index: 10;
            background: #050000;
            padding: 60px 0 20px; border-top: 3px solid var(--maroon);
        }

        .circuit-container { display: flex; justify-content: center; gap: 60px; padding-bottom: 50px; flex-wrap: wrap; }
        .circuit-switch { position: relative; width: 140px; text-align: center; cursor: pointer; }
        .switch-label { font-weight: 900; font-size: 1.4rem; color: #fff; display: block; margin-bottom: 10px; }
        .chip-icon { font-size: 2.5rem; color: #222; transition: 0.4s; }
        
        .mid-switch:hover .chip-icon { color: var(--gold); filter: drop-shadow(0 0 10px var(--gold)); }
        .final-switch:hover .chip-icon { color: var(--neon-green); filter: drop-shadow(0 0 10px var(--neon-green)); }

        .calendar-box {
            max-width: 1100px; margin: 20px auto; 
            border: 2px solid var(--maroon); background: #000;
        }

        footer { background: #000; padding: 40px 20px; border-top: 1px solid #1a1a1a; text-align: center; }
        .dev-credit { color: var(--gold); font-weight: bold; text-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <img src="Logo-batch.png" alt="Logo" class="main-logo">
            <div class="header-title">AUST EEE-2.1</div>
        </div>
        <div class="search-wrapper">
            <input type="text" placeholder="Search resources...">
            <button>Search</button>
        </div>
        <nav class="navbar">
            <ul class="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Study Materials</a></li>
                <li><a href="#">Routine</a></li>
                <li><a href="#">Exams</a></li>
                <li><a href="#">Faculty</a></li>
                <li><a href="#">Notice</a></li>
                <li><a href="#">CR Section</a></li>
                <li><a href="#">Syllabus</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="theme-container">
        <!-- Left Side: 3 Waves -->
        <div class="wave-sidebar wave-left">
            <!-- Wave 1: Sine -->
            <div class="wave-column">
                <div class="wave-svg-unit" id="sine-left"></div>
                <div class="wave-svg-unit" id="sine-left-dup"></div>
            </div>
            <!-- Wave 2: Square -->
            <div class="wave-column">
                <div class="wave-svg-unit" id="square-left"></div>
                <div class="wave-svg-unit" id="square-left-dup"></div>
            </div>
            <!-- Wave 3: Sawtooth -->
            <div class="wave-column">
                <div class="wave-svg-unit" id="saw-left"></div>
                <div class="wave-svg-unit" id="saw-left-dup"></div>
            </div>
        </div>

        <div class="theme-viewport">
            <img src="Theme.png" alt="AUST EEE Theme">
        </div>

        <!-- Right Side: 3 Waves -->
        <div class="wave-sidebar wave-right">
            <div class="wave-column">
                <div class="wave-svg-unit" id="sine-right"></div>
                <div class="wave-svg-unit" id="sine-right-dup"></div>
            </div>
            <div class="wave-column">
                <div class="wave-svg-unit" id="square-right"></div>
                <div class="wave-svg-unit" id="square-right-dup"></div>
            </div>
            <div class="wave-column">
                <div class="wave-svg-unit" id="saw-right"></div>
                <div class="wave-svg-unit" id="saw-right-dup"></div>
            </div>
        </div>
    </div>

    <div class="shutter-panel">
        <section class="circuit-container">
            <div class="circuit-switch mid-switch" onclick="window.open('https://drive.google.com/drive/folders/1pkQrFPMUpagvHlvT8JCxGXLZuhA7yLv6', '_blank')">
                <span class="switch-label">MID DRIVE</span>
                <i class="fas fa-microchip chip-icon"></i>
            </div>
            <div class="circuit-switch final-switch" onclick="window.open('https://final-exam-psi-neon.vercel.app/', '_blank')">
                <span class="switch-label">FINAL DRIVE</span>
                <i class="fas fa-bolt chip-icon"></i>
            </div>
        </section>

        <div class="calendar-box">
            <iframe src="https://calendar.google.com/calendar/embed?src=austeee53@gmail.com&ctz=Asia%2FDhaka" 
            style="border: 0" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
        </div>

        <footer>
            <div class="dev-credit">Developed by: Ratul Krishna Mojumder</div>
        </footer>
    </div>

    <script>
        // Function to create continuous SVG paths
        function generateWave(type, color) {
            let path = "";
            if(type === 'sine') {
                path = "M20,0 ";
                for(let i=0; i<=1000; i+=50) { path += `Q40,${i+12.5} 20,${i+25} T20,${i+50} `; }
            } else if(type === 'square') {
                path = "M10,0 ";
                for(let i=0; i<=1000; i+=50) { path += `L35,${i} L35,${i+25} L10,${i+25} L10,${i+50} `; }
            } else if(type === 'saw') {
                path = "M10,0 ";
                for(let i=0; i<=1000; i+=50) { path += `L35,${i+40} L10,${i+40} `; }
            }

            return `
                <svg preserveAspectRatio="none" viewBox="0 0 50 1000" style="height:100%; width:100%; color:${color};">
                    <path d="${path}" fill="none" stroke="currentColor" stroke-width="3" class="traveling-path"/>
                </svg>
            `;
        }

        const configs = [
            {id: 'sine', type: 'sine', color: 'var(--gold)'},
            {id: 'square', type: 'square', color: 'var(--neon-green)'},
            {id: 'saw', type: 'saw', color: 'var(--neon-blue)'}
        ];

        configs.forEach(conf => {
            const html = generateWave(conf.type, conf.color);
            document.getElementById(`${conf.id}-left`).innerHTML = html;
            document.getElementById(`${conf.id}-left-dup`).innerHTML = html;
            document.getElementById(`${conf.id}-right`).innerHTML = html;
            document.getElementById(`${conf.id}-right-dup`).innerHTML = html;
        });
    </script>
</body>
</html>

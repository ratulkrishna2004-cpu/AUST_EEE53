<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE 2.1 | Spardho 53</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --maroon-dark: #1a0000;
            --gold: #FFD700;
            --green-neon: #39FF14;
            --circuit-grey: #444;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: var(--gold);
            scroll-behavior: smooth;
        }

        /* Parallax Theme Background */
        .hero-section {
            height: 100vh;
            background-image: url('Theme.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Logo Smoke Effect */
        .logo-wrapper { position: relative; text-align: center; }
        .batch-logo { height: 110px; z-index: 10; position: relative; filter: drop-shadow(0 0 10px var(--gold)); }
        .smoke {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; background: radial-gradient(circle, var(--green-neon), var(--gold), transparent);
            filter: blur(45px); opacity: 0.5; animation: pulse 4s infinite alternate;
        }
        @keyframes pulse { 0% { opacity: 0.3; scale: 0.9; } 100% { opacity: 0.6; scale: 1.2; } }

        /* Content Layer with Redish Black BG */
        .content-layer {
            background: linear-gradient(180deg, #1a0000 0%, #000000 100%);
            position: relative; z-index: 20; padding-bottom: 50px;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.9);
        }

        /* Circuit Switch Section */
        .circuit-container {
            display: flex; justify-content: center; gap: 40px; padding: 80px 20px;
            flex-wrap: wrap;
        }

        .circuit-switch {
            position: relative; width: 160px; height: 100px;
            cursor: pointer; text-align: center;
        }

        /* Circuit Lines */
        .wire {
            position: absolute; top: 50%; width: 40px; height: 4px;
            background: var(--circuit-grey); transition: 0.3s;
        }
        .wire.left { left: 0; }
        .wire.right { right: 0; }

        .switch-label {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            font-weight: bold; font-size: 1.5rem; letter-spacing: 2px;
            transition: 0.3s; color: rgba(255, 215, 0, 0.5);
        }

        /* Hover/Active State */
        .circuit-switch:hover .wire, .circuit-switch:active .wire {
            background: var(--gold);
            box-shadow: 0 0 15px var(--gold);
            width: 55px; /* Connects closer */
        }

        .circuit-switch:hover .switch-label, .circuit-switch:active .switch-label {
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold);
        }

        /* Glow Effect Background */
        .glow-bg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2), transparent);
            opacity: 0; transition: 0.4s; z-index: -1;
        }
        .circuit-switch:hover .glow-bg { opacity: 1; }

        /* Footer & Developer Info */
        footer {
            background: #000; padding: 60px 20px; text-align: center;
            border-top: 1px solid #300;
        }
        .mail-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: #4a0000; color: var(--gold); padding: 12px 30px;
            border-radius: 30px; border: 2px solid var(--gold);
            text-decoration: none; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="logo-wrapper">
            <div class="smoke"></div>
            <img src="Logo-batch.png" alt="Logo" class="batch-logo">
            <h1 style="font-size: 3rem; text-shadow: 0 0 15px #000;">AUST EEE-2.1</h1>
        </div>
    </section>

    <div class="content-layer">
        <div class="circuit-container">
            <div class="circuit-switch" onclick="openLink('MID')">
                <span class="switch-label">MID</span>
                <div class="glow-bg"></div>
                <div class="wire left"></div>
                <div class="wire right"></div>
                <i class="fas fa-microchip" style="font-size: 2rem; margin-top: 40px; opacity: 0.3;"></i>
            </div>

            <div class="circuit-switch" onclick="openLink('FINAL')">
                <span class="switch-label">FINAL</span>
                <div class="glow-bg"></div>
                <div class="wire left"></div>
                <div class="wire right"></div>
                <i class="fas fa-bolt" style="font-size: 2rem; margin-top: 40px; opacity: 0.3;"></i>
            </div>
        </div>

        <div style="max-width: 1000px; margin: 0 auto; background: white; border-radius: 15px; overflow: hidden; border: 3px solid var(--gold);">
            <iframe src="https://calendar.google.com/calendar/embed?src=austeee53@gmail.com" width="100%" height="600" frameborder="0"></iframe>
        </div>

        <footer>
            <h2 style="color: var(--gold); margin-bottom: 5px;">Developed by: <b>Ratul Krishna Mojumder</b></h2>
            <a href="mailto:aust53@gmail.com" class="mail-btn">
                <i class="fas fa-envelope"></i> aust53@gmail.com
            </a>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnx342TC2Iry0lBYDBEzTlu0t-BZPWETg",
            authDomain: "spardho53.firebaseapp.com",
            databaseURL: "https://spardho53-default-rtdb.firebaseio.com",
            projectId: "spardho53",
            storageBucket: "spardho53.firebasestorage.app",
            messagingSenderId: "432228439641",
            appId: "1:432228439641:web:9a558dc03eefde7c694348"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const MID_LINK = "https://drive.google.com/drive/folders/1pkQrFPMUpagvHlvT8JCxGXLZuhA7yLv6";
        const FINAL_LINK = "https://final-exam-psi-neon.vercel.app/";

        window.openLink = (type) => {
            const link = (type === 'FINAL') ? FINAL_LINK : MID_LINK;
            window.open(link, '_blank');
            set(ref(db, 'siteMode'), type);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE-53 | Oscilloscope Flow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --maroon: #800000;
            --maroon-dark: #4d0000;
            --gold: #FFD700;
            --neon-green: #39FF14;
            --neon-blue: #00FFFF;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(to bottom, var(--maroon), var(--maroon-dark));
            padding: 10px 0; text-align: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header-top { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .main-logo { height: 45px; cursor: pointer; }
        .header-title { color: var(--gold); font-style: italic; font-size: 1.4rem; font-weight: bold; }

        .search-wrapper {
            max-width: 95%; margin: 10px auto; display: flex;
            border: 2px solid #00FF00; border-radius: 30px;
            overflow: hidden; background: #fff;
        }
        .search-wrapper input { flex: 1; border: none; padding: 8px 20px; outline: none; }
        .search-wrapper button { background: #cc0000; color: #fff; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }

        .navbar { background: var(--maroon-dark); border-bottom: 1px solid rgba(255,215,0,0.2); }
        .nav-menu {
            display: flex; flex-wrap: wrap; justify-content: center;
            list-style: none; margin: 0; padding: 8px; gap: 5px;
        }
        .nav-menu li a { color: #fff; text-decoration: none; font-size: 13px; padding: 5px 10px; }

        /* --- THEME & OSCILLOSCOPE WAVE SECTION --- */
        .theme-container {
            position: sticky; top: 160px; z-index: 1;
            width: 100%; height: calc(100vh - 160px);
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .theme-viewport {
            width: 60%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            z-index: 5; background: rgba(0,0,0,0.5);
        }
        .theme-viewport img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Moving Wave Sidebars */
        .wave-sidebar {
            position: absolute; top: 0; width: 20%; height: 100%;
            overflow: hidden; pointer-events: none;
        }
        .wave-left { left: 0; border-right: 1px solid rgba(57, 255, 20, 0.2); }
        .wave-right { right: 0; border-left: 1px solid rgba(57, 255, 20, 0.2); }

        /* Animation for the flow */
        .wave-track {
            position: absolute; width: 100%;
            display: flex; flex-direction: column;
            animation: oscilloscope-flow 2s linear infinite; /* T=1 feel, high speed */
        }

        @keyframes oscilloscope-flow {
            from { transform: translateY(-50%); }
            to { transform: translateY(0); }
        }

        .wave-svg { 
            width: 100%; height: 150px; 
            filter: drop-shadow(0 0 8px currentColor);
            margin-bottom: 20px;
        }

        /* --- SHUTTER PANEL --- */
        .shutter-panel {
            position: relative; z-index: 10;
            background: linear-gradient(180deg, #120000 0%, #000 100%);
            box-shadow: 0 -25px 50px rgba(0,0,0,1);
            padding-top: 60px; border-top: 3px solid var(--maroon);
        }

        .circuit-container { display: flex; justify-content: center; gap: 80px; padding: 50px 20px; flex-wrap: wrap; }
        .circuit-switch { position: relative; width: 160px; height: 100px; cursor: pointer; text-align: center; }
        .switch-label {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            font-weight: 900; font-size: 1.5rem; color: #fff; transition: 0.4s;
        }
        .wire { position: absolute; top: 60%; width: 30px; height: 4px; background: #222; transition: 0.4s; }
        .wire.left { left: 10px; } .wire.right { right: 10px; }
        .chip-icon { font-size: 2.2rem; margin-top: 45px; color: #111; transition: 0.4s; }

        .mid-switch:hover .wire { background: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .mid-switch:hover .chip-icon { color: var(--gold); }
        .mid-switch:hover .switch-label { color: var(--gold); }

        .final-switch:hover .wire { background: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        .final-switch:hover .chip-icon { color: var(--neon-green); }
        .final-switch:hover .switch-label { color: var(--neon-green); }

        /* --- FOOTER --- */
        footer { background: #000; padding: 50px 20px 20px; border-top: 1px solid #1a1a1a; }
        .dev-credit { 
            text-align: center; margin-top: 30px; font-size: 1.1rem; font-weight: bold;
            color: var(--gold); text-shadow: 0 0 10px var(--gold);
            animation: glow-pulse 2s infinite alternate;
        }
        @keyframes glow-pulse { from { opacity: 0.7; } to { opacity: 1; text-shadow: 0 0 20px var(--gold); } }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <a href="index.html"><img src="Logo-batch.png" alt="Logo" class="main-logo"></a>
            <div class="header-title">AUST EEE-2.1</div>
        </div>
        <nav class="navbar">
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Study Materials</a></li>
                <li><a href="#">Routine</a></li>
                <li><a href="#">Exams</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="theme-container">
        <!-- Left Sidebar -->
        <div class="wave-sidebar wave-left">
            <div class="wave-track" id="leftTrack"></div>
        </div>

        <!-- Central Theme -->
        <div class="theme-viewport">
            <img src="Theme.png" alt="AUST EEE-53 Theme">
        </div>

        <!-- Right Sidebar -->
        <div class="wave-sidebar wave-right">
            <div class="wave-track" id="rightTrack"></div>
        </div>
    </div>

    <div class="shutter-panel">
        <section class="circuit-container">
            <div class="circuit-switch mid-switch" onclick="window.open('https://drive.google.com/drive/folders/1pkQrFPMUpagvHlvT8JCxGXLZuhA7yLv6', '_blank')">
                <span class="switch-label">MID</span>
                <div class="wire left"></div><div class="wire right"></div>
                <i class="fas fa-microchip chip-icon"></i>
            </div>
            <div class="circuit-switch final-switch" onclick="window.open('https://final-exam-psi-neon.vercel.app/', '_blank')">
                <span class="switch-label">FINAL</span>
                <div class="wire left"></div><div class="wire right"></div>
                <i class="fas fa-bolt chip-icon"></i>
            </div>
        </section>

        <footer>
            <div class="dev-credit">Developed by: Ratul Krishna Mojumder</div>
        </footer>
    </div>

    <script>
        function populateTrack(trackId) {
            const track = document.getElementById(trackId);
            const colors = ['#FFD700', '#39FF14', '#00FFFF'];
            // Oscilloscope style sharp paths
            const wavePaths = [
                "M10 80 Q 50 10 90 80 T 170 80", // Sine
                "M10 80 L 50 80 L 50 20 L 130 20 L 130 80 L 170 80", // Square
                "M10 80 L 90 20 L 90 80 L 170 80" // Sawtooth
            ];

            // Create a long list of waves for seamless scrolling
            for (let i = 0; i < 20; i++) {
                const color = colors[i % colors.length];
                const path = wavePaths[i % wavePaths.length];
                const svg = `
                    <svg class="wave-svg" viewBox="0 0 180 100" style="color: ${color}">
                        <path d="${path}" stroke="currentColor" fill="none" stroke-width="4" stroke-join="round" />
                    </svg>`;
                track.innerHTML += svg;
            }
        }

        populateTrack('leftTrack');
        populateTrack('rightTrack');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE-53 | Spardho 53</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --maroon-header: #800000;
            --maroon-dark: #4d0000;
            --gold: #FFD700;
            --neon-green: #00FF00;
            --circuit-grey: #444;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            scroll-behavior: smooth;
        }

        /* --- HEADER (As per image_9b1542.jpg) --- */
        header {
            background: linear-gradient(to bottom, var(--maroon-header), var(--maroon-dark));
            padding: 15px 0;
            text-align: center;
            z-index: 100;
        }

        .header-top {
            display: flex; justify-content: center; align-items: center;
            gap: 15px; margin-bottom: 10px;
        }

        .main-logo { height: 50px; }
        .header-title { color: var(--gold); font-style: italic; font-size: 1.5rem; font-weight: bold; }

        .search-wrapper {
            max-width: 95%; margin: 10px auto; display: flex;
            border: 2px solid var(--neon-green); border-radius: 30px;
            overflow: hidden; background: #fff;
        }

        .search-wrapper input { flex: 1; border: none; padding: 10px 20px; outline: none; }
        .search-wrapper button { background: #cc0000; color: #fff; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; }

        /* --- NAVIGATION --- */
        .navbar { background: var(--maroon-dark); border-bottom: 1px solid rgba(255,215,0,0.2); }
        .nav-menu {
            display: flex; flex-wrap: wrap; justify-content: center;
            list-style: none; margin: 0; padding: 10px; gap: 5px;
        }
        .nav-menu li a { color: #fff; text-decoration: none; font-size: 14px; padding: 5px 12px; transition: 0.3s; }
        .nav-menu li a:hover { color: var(--gold); }

        .menu-toggle {
            display: none; font-size: 1.8rem; color: var(--gold);
            cursor: pointer; padding: 10px; text-align: right; margin-right: 20px;
        }

        /* --- THEME SECTION --- */
        .theme-container {
            width: 100%; min-height: 400px;
            background-image: url('Theme.png');
            background-size: cover; background-position: center;
            border-bottom: 3px solid var(--maroon-header);
        }

        /* --- CIRCUIT SWITCHES --- */
        .circuit-container {
            display: flex; justify-content: center; gap: 50px; padding: 60px 20px;
            background: linear-gradient(180deg, #1a0000 0%, #000000 100%);
        }
        .circuit-switch {
            position: relative; width: 140px; height: 80px; cursor: pointer; text-align: center;
        }
        .switch-label {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            font-weight: bold; font-size: 1.2rem; color: rgba(255, 215, 0, 0.4); transition: 0.3s;
        }
        .wire { position: absolute; top: 50%; width: 35px; height: 4px; background: var(--circuit-grey); transition: 0.3s; }
        .wire.left { left: 0; } .wire.right { right: 0; }
        
        .circuit-switch:hover .wire { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .circuit-switch:hover .switch-label { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* --- CALENDAR --- */
        .calendar-section { padding: 40px 20px; background: #000; }
        .calendar-frame {
            max-width: 1000px; margin: 0 auto; border: 2px solid var(--gold);
            border-radius: 15px; overflow: hidden; background: #fff;
        }

        /* --- FOOTER (Your specific design) --- */
        footer {
            background: #000; padding: 40px 20px 20px 20px;
            border-top: 1px solid #222;
        }
        .footer-main {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto;
        }
        .footer-left a {
            font-size: 1.8rem; font-weight: bold; color: var(--gold); text-decoration: none;
        }
        .footer-right .mail-icon { font-size: 1.8rem; color: var(--gold); }
        
        .footer-dev {
            text-align: center; margin-top: 25px; font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5); border-top: 1px solid #111; padding-top: 15px;
        }

        /* --- RESPONSIVE --- */
        @media screen and (max-width: 768px) {
            .nav-menu {
                display: none; flex-direction: column; width: 100%; 
                background: var(--maroon-dark); position: absolute; top: 100%; left: 0; z-index: 1000;
            }
            .nav-menu.active { display: flex; }
            .menu-toggle { display: block; }
            .circuit-container { gap: 20px; }
        }
    </style>
</head>
<body>

    <!-- Header & Search -->
    <header>
        <div class="header-top">
            <img src="Logo-batch.png" alt="Logo" class="main-logo">
            <div class="header-title">AUST EEE-2.1</div>
        </div>
        <div class="search-wrapper">
            <input type="text" placeholder="Search...">
            <button>Search</button>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
        <ul class="nav-menu" id="navLinks">
            <li><a href="#">Home</a></li>
            <li><a href="#">2.1 Study Materials</a></li>
            <li><a href="#">Previous Semester</a></li>
            <li><a href="#">Routine</a></li>
            <li><a href="#">Exams</a></li>
            <li><a href="#">Faculty</a></li>
            <li><a href="#">BUS Route</a></li>
            <li><a href="#">Notice</a></li>
            <li><a href="#">CR & GM Section</a></li>
            <li><a href="#">Credits</a></li>
            <li><a href="#">OBE Syllabus</a></li>
            <li><a href="#">Helping Sites</a></li>
            <li><a href="#">Waiver</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
    </nav>

    <!-- Theme Photo Section -->
    <div class="theme-container"></div>

    <!-- Circuit Switches (Mid/Final) -->
    <section class="circuit-container">
        <div class="circuit-switch" onclick="window.open('https://drive.google.com/drive/folders/1pkQrFPMUpagvHlvT8JCxGXLZuhA7yLv6', '_blank')">
            <span class="switch-label">MID</span>
            <div class="wire left"></div>
            <div class="wire right"></div>
            <i class="fas fa-microchip" style="font-size: 1.5rem; margin-top: 35px; color: #333;"></i>
        </div>

        <div class="circuit-switch" onclick="window.open('https://final-exam-psi-neon.vercel.app/', '_blank')">
            <span class="switch-label">FINAL</span>
            <div class="wire left"></div>
            <div class="wire right"></div>
            <i class="fas fa-bolt" style="font-size: 1.5rem; margin-top: 35px; color: #333;"></i>
        </div>
    </section>

    <!-- Calendar Section -->
    <section class="calendar-section">
        <div class="calendar-frame">
            <iframe src="https://calendar.google.com/calendar/embed?src=austeee53@gmail.com&ctz=Asia%2FDhaka" 
            style="border: 0" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-main">
            <div class="footer-left">
                <a href="index.html">AUST EEE-53</a>
            </div>
            <div class="footer-right">
                <a href="mailto:austeee53@gmail.com" class="mail-icon">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
        <div class="footer-dev">
            Developed by: Ratul Krishna Mojumder
        </div>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('navLinks');
            menu.classList.toggle('active');
        }
    </script>

</body>
</html>

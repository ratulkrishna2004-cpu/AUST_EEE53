<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST EEE-53 | Official Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --maroon: #800000;
            --maroon-dark: #4d0000;
            --gold: #FFD700;
            --neon-green: #39FF14;
            --neon-blue: #00FFFF;
            --search-border: #00FF00;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(to bottom, var(--maroon), var(--maroon-dark));
            padding: 10px 0; text-align: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header-top { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .main-logo { height: 45px; cursor: pointer; }
        .header-title { color: var(--gold); font-style: italic; font-size: 1.4rem; font-weight: bold; }

        .search-wrapper {
            max-width: 95%; margin: 10px auto; display: flex;
            border: 2px solid var(--search-border); border-radius: 30px;
            overflow: hidden; background: #fff;
        }
        .search-wrapper input { flex: 1; border: none; padding: 8px 20px; outline: none; }
        .search-wrapper button { background: #cc0000; color: #fff; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }

        .navbar { background: var(--maroon-dark); border-bottom: 1px solid rgba(255,215,0,0.2); }
        .nav-menu {
            display: flex; flex-wrap: wrap; justify-content: center;
            list-style: none; margin: 0; padding: 8px; gap: 5px;
        }
        .nav-menu li a { color: #fff; text-decoration: none; font-size: 13px; padding: 5px 10px; transition: 0.3s; }
        .nav-menu li a:hover { color: var(--gold); }

        /* --- THEME SECTION & WAVE ANIMATION --- */
        .theme-container {
            position: sticky; top: 160px; z-index: 1;
            width: 100%; height: calc(100vh - 160px);
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .theme-viewport {
            width: 70%; height: 100%; /* theme takes 70% width */
            display: flex; justify-content: center; align-items: center;
            z-index: 5;
        }
        .theme-viewport img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Wave Sidebars */
        .wave-sidebar {
            position: absolute; top: 0; width: 15%; height: 200%; /* Height 200% for smooth loop */
            display: flex; flex-direction: column; align-items: center;
            opacity: 0.6; pointer-events: none;
            animation: wave-slide 10s linear infinite;
        }
        .wave-left { left: 0; }
        .wave-right { right: 0; }

        .wave-svg { width: 80px; height: 150px; margin: 10px 0; }

        @keyframes wave-slide {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        /* --- SHUTTER PANEL --- */
        .shutter-panel {
            position: relative; z-index: 10;
            background: linear-gradient(180deg, #120000 0%, #000 100%);
            box-shadow: 0 -25px 50px rgba(0,0,0,1);
            padding-top: 60px; border-top: 3px solid var(--maroon);
        }

        /* --- INTERACTIVE CIRCUIT --- */
        .circuit-container { display: flex; justify-content: center; gap: 80px; padding: 50px 20px; flex-wrap: wrap; }
        .circuit-switch { position: relative; width: 160px; height: 100px; cursor: pointer; text-align: center; }
        .switch-label {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            font-weight: 900; font-size: 1.5rem; color: #fff; transition: 0.4s;
        }
        .wire { position: absolute; top: 60%; width: 30px; height: 4px; background: #222; transition: 0.4s ease-in-out; }
        .wire.left { left: 10px; } .wire.right { right: 10px; }
        .chip-icon { font-size: 2.2rem; margin-top: 45px; color: #111; transition: 0.4s; }

        .mid-switch:hover .wire { background: var(--gold); width: 50px; box-shadow: 0 0 15px var(--gold); }
        .mid-switch:hover .chip-icon { color: var(--gold); filter: drop-shadow(0 0 10px var(--gold)); }
        .mid-switch:hover .switch-label { color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        .final-switch:hover .wire { background: var(--neon-green); width: 50px; box-shadow: 0 0 15px var(--neon-green); }
        .final-switch:hover .chip-icon { color: var(--neon-green); filter: drop-shadow(0 0 10px var(--neon-green)); }
        .final-switch:hover .switch-label { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }

        /* --- FOOTER --- */
        footer { background: #000; padding: 50px 20px 20px; border-top: 1px solid #1a1a1a; }
        .footer-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .dev-credit { 
            text-align: center; margin-top: 30px; font-size: 1.1rem; font-weight: bold;
            color: var(--gold); text-shadow: 0 0 10px var(--gold);
            animation: glow-pulse 2s infinite alternate;
        }
        @keyframes glow-pulse { from { opacity: 0.7; } to { opacity: 1; } }

        @media screen and (max-width: 768px) {
            .wave-sidebar { display: none; }
            .theme-viewport { width: 100%; height: 50vh; position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <a href="index.html"><img src="Logo-batch.png" alt="Logo" class="main-logo"></a>
            <div class="header-title">AUST EEE-2.1</div>
        </div>
        <div class="search-wrapper">
            <input type="text" placeholder="Search study materials...">
            <button>Search</button>
        </div>
        <nav class="navbar">
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">2.1 Study Materials</a></li>
                <li><a href="#">Previous Semester</a></li>
                <li><a href="#">Routine</a></li>
                <li><a href="#">Exams</a></li>
                <li><a href="#">Faculty</a></li>
                <li><a href="#">BUS Route</a></li>
                <li><a href="#">Notice</a></li>
                <li><a href="#">CR & GM Section</a></li>
                <li><a href="#">Credits</a></li>
                <li><a href="#">OBE Syllabus</a></li>
                <li><a href="#">Helping Sites</a></li>
                <li><a href="#">Waiver</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="theme-container">
        <!-- Left Sidebar Waves -->
        <div class="wave-sidebar wave-left" id="leftWaves"></div>

        <!-- Central Theme -->
        <div class="theme-viewport">
            <img src="Theme.png" alt="AUST EEE-53 Theme">
        </div>

        <!-- Right Sidebar Waves -->
        <div class="wave-sidebar wave-right" id="rightWaves"></div>
    </div>

    <div class="shutter-panel">
        <section class="circuit-container">
            <div class="circuit-switch mid-switch" onclick="window.open('https://drive.google.com/drive/folders/1pkQrFPMUpagvHlvT8JCxGXLZuhA7yLv6', '_blank')">
                <span class="switch-label">MID</span>
                <div class="wire left"></div>
                <div class="wire right"></div>
                <i class="fas fa-microchip chip-icon"></i>
            </div>
            <div class="circuit-switch final-switch" onclick="window.open('https://final-exam-psi-neon.vercel.app/', '_blank')">
                <span class="switch-label">FINAL</span>
                <div class="wire left"></div>
                <div class="wire right"></div>
                <i class="fas fa-bolt chip-icon"></i>
            </div>
        </section>

        <div style="max-width: 1000px; margin: 40px auto; border-radius: 12px; overflow: hidden; border: 2px solid var(--maroon);">
            <iframe src="https://calendar.google.com/calendar/embed?src=austeee53@gmail.com&ctz=Asia%2FDhaka" 
            style="border: 0" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
        </div>

        <footer>
            <div class="footer-top">
                <a href="index.html" style="font-size: 2rem; font-weight: bold; color: var(--gold); text-decoration: none;">AUST EEE-53</a>
                <a href="mailto:austeee53@gmail.com" style="font-size: 2rem; color: var(--gold);"><i class="fas fa-envelope"></i></a>
            </div>
            <div class="dev-credit">Developed by: Ratul Krishna Mojumder</div>
        </footer>
    </div>

    <script>
        // Function to generate Wave SVGs
        function createWaves(containerId) {
            const container = document.getElementById(containerId);
            const colors = ['#FFD700', '#39FF14', '#00FFFF']; // Gold, Neon Green, Blue
            const waveTypes = [
                "M0 75 Q 20 40 40 75 T 80 75", // Sinusoidal
                "M0 75 L 20 75 L 20 40 L 60 40 L 60 75 L 80 75", // Square
                "M0 75 L 40 40 L 40 75 L 80 75" // Sawtooth
            ];

            // Create two sets for seamless looping
            for (let j = 0; j < 2; j++) {
                for (let i = 0; i < 15; i++) {
                    const color = colors[i % colors.length];
                    const path = waveTypes[i % waveTypes.length];
                    const svg = `
                        <svg class="wave-svg" viewBox="0 0 80 150">
                            <path d="${path}" stroke="${color}" fill="none" stroke-width="3" />
                        </svg>`;
                    container.innerHTML += svg;
                }
            }
        }

        createWaves('leftWaves');
        createWaves('rightWaves');
    </script>
</body>
</html>
